services:
  # ── Backend (Node.js / Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./empowerai-backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./empowerai-backend/.env
    environment:
      # Override AI_SERVICE_URL so backend reaches the ai-service container
      AI_SERVICE_URL: http://ai-service:8000
      NODE_ENV: development
      PORT: "5000"
    volumes:
      - ./empowerai-backend/src:/app/src        # hot reload — source only
      - ./empowerai-backend/scripts:/app/scripts
    depends_on:
      - ai-service
    restart: unless-stopped

  # ── AI Service (Python / FastAPI) ────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service/app:/app/app               # hot reload — app package
      - ./ai-service/main.py:/app/main.py
    restart: unless-stopped

  # ── Frontend (React / Vite) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.local
    environment:
      # Browser calls hit the host-mapped port, not the Docker network name
      VITE_API_BASE_URL: http://localhost:5000/api
    volumes:
      - ./frontend/src:/app/src                 # hot reload — source only
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (optional — only needed for BullMQ async job queue) ────────────────
  # Start with: docker compose --profile redis up
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - redis
    restart: unless-stopped
