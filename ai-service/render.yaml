services:
  - type: web
    name: empowerai-ai-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PORT
        value: 10000
      - key: REQUIRE_AI_SERVICE_API_KEY
        value: true
      - key: AI_SERVICE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

