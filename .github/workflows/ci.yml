name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — type check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_API_BASE_URL: https://placeholder.onrender.com/api
          VITE_USE_DEMO_MODE: 'false'
          VITE_COMING_SOON: 'false'

  backend:
    name: Backend — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: empowerai-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: empowerai-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --forceExit
        env:
          NODE_ENV: test

  ai-service:
    name: AI Service — import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core dependencies
        run: pip install fastapi uvicorn pydantic pydantic-settings python-dotenv httpx structlog

      - name: Syntax check
        run: python -m py_compile main.py && echo "Syntax OK"

      - name: Import check
        run: |
          python -c "
          import fastapi, uvicorn, pydantic
          print('Core imports OK')
          "
