version: 2
updates:
  # Frontend - React / Vite / TypeScript
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      all-frontend:
        patterns:
          - "*"

  # Backend - Node.js / Express
  - package-ecosystem: "npm"
    directory: "/empowerai-backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      all-backend:
        patterns:
          - "*"

  # AI service - Python / FastAPI
  - package-ecosystem: "pip"
    directory: "/ai-service"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      all-ai-service:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-actions:
        patterns:
          - "*"
